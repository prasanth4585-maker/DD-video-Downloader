<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .downloader-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .platform-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .platform-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            padding: 5px;
        }

        .youtube { background: #FF0000; }
        .instagram { background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        .tiktok { background: #000000; }
        .facebook { background: #1877F2; }
        .twitter { background: #1DA1F2; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .option-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        .option-group h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .dd-credit {
            text-align: right;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite, glow-pulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 0, 128, 0.8))
                    drop-shadow(0 0 20px rgba(64, 224, 208, 0.6))
                    drop-shadow(0 0 30px rgba(255, 140, 0, 0.4));
            text-transform: uppercase;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(255, 0, 128, 0.8))
                        drop-shadow(0 0 20px rgba(64, 224, 208, 0.6))
                        drop-shadow(0 0 30px rgba(255, 140, 0, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 128, 1))
                        drop-shadow(0 0 40px rgba(64, 224, 208, 0.8))
                        drop-shadow(0 0 60px rgba(255, 140, 0, 0.6));
            }
        }

        .result-box {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .result-item button {
            padding: 8px 20px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffe6e6;
            color: #d32f2f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #d32f2f;
        }

        .info-message {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #1976d2;
        }

        .thumbnail {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 5px;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .video-meta {
            font-size: 12px;
            color: #666;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .downloader-section {
                padding: 20px;
                border-radius: 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 14px;
            }

            .platform-icons {
                gap: 10px;
            }

            .platform-icon {
                width: 45px;
                height: 45px;
                font-size: 10px;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="text"] {
                padding: 12px 15px;
                font-size: 14px;
            }

            button {
                padding: 12px 20px;
                font-size: 14px;
                width: 100%;
            }

            .options-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .option-group {
                padding: 15px;
            }

            .option-group h3 {
                font-size: 14px;
            }

            .radio-option {
                font-size: 14px;
            }

            .download-btn {
                padding: 15px;
                font-size: 16px;
            }

            .result-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .result-item button {
                width: 100%;
            }

            .dd-credit {
                text-align: center;
                font-size: 16px;
            }

            .thumbnail {
                width: 100%;
                height: auto;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .platform-icon {
                width: 40px;
                height: 40px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="downloader-section">
            <h1>🎬 Social Media Downloader</h1>
            <p class="subtitle">Download videos, audio, and images from any platform</p>
            
            <div class="platform-icons">
                <div class="platform-icon youtube">YouTube</div>
                <div class="platform-icon instagram">Instagram</div>
                <div class="platform-icon tiktok">TikTok</div>
                <div class="platform-icon facebook">Facebook</div>
                <div class="platform-icon twitter">Twitter/X</div>
            </div>

            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Paste video/image URL here...">
                <button onclick="analyzeUrl()" id="analyzeBtn">Analyze</button>
            </div>

            <div class="options-grid">
                <div class="option-group">
                    <h3>📹 Video Quality</h3>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="quality" value="144"> 144p (Low)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="240"> 240p
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="360"> 360p (Medium)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="480"> 480p
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="720" checked> 720p HD
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="1080"> 1080p Full HD
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="1440"> 1440p 2K
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="quality" value="2160"> 4K Ultra HD
                        </label>
                    </div>
                </div>

                <div class="option-group">
                    <h3>🎵 Audio Quality</h3>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="audioQuality" value="64" checked> 64 kbps
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="audioQuality" value="128"> 128 kbps
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="audioQuality" value="192"> 192 kbps
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="audioQuality" value="256"> 256 kbps
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="audioQuality" value="320"> 320 kbps (Best)
                        </label>
                    </div>
                </div>

                <div class="option-group">
                    <h3>📁 Download Format</h3>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="type" value="video-mp4" checked> Video (MP4)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="video-webm"> Video (WebM)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="video-mkv"> Video (MKV)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="audio-mp3"> Audio (MP3)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="audio-m4a"> Audio (M4A)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="audio-wav"> Audio (WAV)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="audio-flac"> Audio (FLAC)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="type" value="audio-aac"> Audio (AAC)
                        </label>
                    </div>
                </div>
            </div>

            <button class="download-btn" onclick="downloadMedia()" id="downloadBtn">⬇️ Download Now</button>

            <div class="dd-credit">DD creation</div>

            <div class="result-box" id="resultBox"></div>
        </div>
    </div>

    <script>
        let videoData = null;

        function detectPlatform(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('instagram.com')) return 'instagram';
            if (url.includes('tiktok.com')) return 'tiktok';
            if (url.includes('facebook.com') || url.includes('fb.watch')) return 'facebook';
            if (url.includes('twitter.com') || url.includes('x.com')) return 'twitter';
            return 'unknown';
        }

        async function analyzeUrl() {
            const url = document.getElementById('urlInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            const analyzeBtn = document.getElementById('analyzeBtn');
            
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            const platform = detectPlatform(url);
            if (platform === 'unknown') {
                showError('Unsupported platform. Please use YouTube, Instagram, TikTok, Facebook, or Twitter/X URLs.');
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.textContent = 'Analyzing...';
            resultBox.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching video information...</div>';
            resultBox.classList.add('show');

            try {
                // Using a free API service for video info
                const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://www.youtube.com/oembed?url=' + url + '&format=json')}`);
                
                if (response.ok) {
                    const data = await response.json();
                    videoData = {
                        title: data.title,
                        thumbnail: data.thumbnail_url,
                        author: data.author_name,
                        url: url,
                        platform: platform
                    };
                    
                    showVideoInfo(videoData);
                } else {
                    throw new Error('Could not fetch video information');
                }
            } catch (error) {
                console.error('Error:', error);
                showInfo(`✅ URL detected: ${platform.toUpperCase()}<br><br>Video information retrieved. Select your options and click "Download Now" to proceed.`);
                videoData = { url: url, platform: platform };
            }

            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Analyze';
        }

        function showVideoInfo(data) {
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `
                <h3>✅ Video Found</h3>
                <div class="result-item">
                    ${data.thumbnail ? `<img src="${data.thumbnail}" class="thumbnail" alt="thumbnail">` : ''}
                    <div class="video-info">
                        <div class="video-title">${data.title || 'Video'}</div>
                        <div class="video-meta">${data.author || ''} • ${data.platform.toUpperCase()}</div>
                    </div>
                </div>
                <div class="info-message">
                    ℹ️ Select your preferred quality and format, then click "Download Now"
                </div>
            `;
        }

        function showError(message) {
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `<div class="error-message">❌ ${message}</div>`;
            resultBox.classList.add('show');
        }

        function showInfo(message) {
            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `<div class="info-message">${message}</div>`;
            resultBox.classList.add('show');
        }

        async function downloadMedia() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showError('Please enter a URL first');
                return;
            }

            const platform = detectPlatform(url);
            const quality = document.querySelector('input[name="quality"]:checked').value;
            const type = document.querySelector('input[name="type"]:checked').value;
            const downloadBtn = document.getElementById('downloadBtn');

            downloadBtn.disabled = true;
            downloadBtn.textContent = 'Processing...';

            // Using multiple fallback services
            const services = [
                {
                    name: 'SaveFrom.net',
                    url: `https://ssyoutube.com/watch?v=${extractVideoId(url)}`
                },
                {
                    name: 'Y2Mate',
                    url: `https://www.y2mate.com/youtube/${extractVideoId(url)}`
                },
                {
                    name: '9xbuddy',
                    url: `https://9xbuddy.org/process?url=${encodeURIComponent(url)}`
                }
            ];

            const resultBox = document.getElementById('resultBox');
            resultBox.innerHTML = `
                <h3>🎯 Download Options</h3>
                <div class="info-message">
                    <strong>Choose a download service:</strong><br><br>
                    ${services.map((service, index) => `
                        <div class="result-item">
                            <div>
                                <strong>${service.name}</strong><br>
                                <small>${type === 'audio' ? 'Audio' : quality + 'p Video'} • ${platform.toUpperCase()}</small>
                            </div>
                            <button onclick="window.open('${service.url}', '_blank')">
                                Download via ${service.name}
                            </button>
                        </div>
                    `).join('')}
                </div>
                <div class="info-message" style="margin-top: 15px;">
                    <strong>📱 How to download:</strong><br>
                    1. Click on any service button above<br>
                    2. The service will open in a new tab<br>
                    3. Select your preferred quality/format<br>
                    4. Click the download button on that page<br><br>
                    <strong>💡 Tip:</strong> If one service doesn't work, try another one!
                </div>
            `;
            resultBox.classList.add('show');

            downloadBtn.disabled = false;
            downloadBtn.textContent = '⬇️ Download Now';
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/,
                /youtube\.com\/embed\/([^&\n?#]+)/,
                /youtube\.com\/v\/([^&\n?#]+)/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return '';
        }

        // Allow Enter key to trigger analyze
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeUrl();
            }
        });
    </script>
</body>
</html>
